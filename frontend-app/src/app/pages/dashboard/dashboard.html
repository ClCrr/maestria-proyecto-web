<mat-toolbar color="primary">
  <span>Mi App</span>

  <span class="spacer"></span>

  <button mat-raised-button color="accent" (click)="logout()">
    Cerrar Sesión
  </button>
</mat-toolbar>

<div class="dashboard-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Bienvenido</mat-card-title>
      <mat-card-subtitle>Dashboard Principal</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>
        Has iniciado sesión correctamente. Bienvenido a la aplicación.
      </p>
    </mat-card-content>
  </mat-card>
</div>
